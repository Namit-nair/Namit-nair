<text x="394.48" y="80" xml:space="preserve"><tspan fill="#c9d1d9">----------------------</tspan></text>

<text x="394.48" y="100" xml:space="preserve"><tspan fill="#fbbf24">OS: </tspan><tspan fill="#c9d1d9">B.Tech Mechatronics &amp; Automation</tspan></text>

<text x="394.48" y="120" xml:space="preserve"><tspan fill="#c9d1d9">    VIT Chennai -- Class of 2027</tspan></text>

<text x="394.48" y="140" xml:space="preserve"><tspan fill="#4ade80">Kernel: </tspan><tspan fill="#c9d1d9">CGPA 8.35 / 10</tspan></text>

<text x="394.48" y="160" xml:space="preserve"><tspan fill="#60a5fa">IDE: </tspan><tspan fill="#c9d1d9">VS Code, PyCharm, MATLAB</tspan></text>

<text x="394.48" y="180" xml:space="preserve"><tspan fill="#22d3ee">Languages: </tspan><tspan fill="#c9d1d9">Python, C++, TypeScript, Dart, MATLAB</tspan></text>

<text x="394.48" y="200" xml:space="preserve"><tspan fill="#e879f9">Frameworks: </tspan><tspan fill="#c9d1d9">ROS2, MuJoCo, Next.js, Flutter</tspan></text>

<text x="394.48" y="220" xml:space="preserve"><tspan fill="#fbbf24">Hardware: </tspan><tspan fill="#c9d1d9">SolidWorks, Arduino, Dynamixel, Pixhawk</tspan></text>

<text x="394.48" y="240" xml:space="preserve"><tspan fill="#4ade80">Controls: </tspan><tspan fill="#c9d1d9">LQR, PID, State-Space, Kalman Filter, Backstepping</tspan></text>

<text x="394.48" y="260" xml:space="preserve"><tspan fill="#60a5fa">Currently: </tspan><tspan fill="#c9d1d9">Soft robotics intern @ IITGN Robotics Lab</tspan></text>

<text x="394.48" y="280" xml:space="preserve"><tspan fill="#c9d1d9">           (tendon-driven hands, w/ Prof. Madhu Vadali)</tspan></text>

<text x="394.48" y="300" xml:space="preserve"><tspan fill="#22d3ee">Leading: </tspan><tspan fill="#c9d1d9">AUV Project Head @ Dreadnought Robotics</tspan></text>

<text x="394.48" y="320" xml:space="preserve"><tspan fill="#c9d1d9">         SAUVC + TAC, ROS2 migration, Gazebo sim</tspan></text>

<text x="394.48" y="340" xml:space="preserve"><tspan fill="#e879f9">Building: </tspan><tspan fill="#c9d1d9">SpiRobs -- soft tentacle manipulator</tspan></text>

<text x="394.48" y="360" xml:space="preserve"><tspan fill="#fb923c">Also: </tspan><tspan fill="#c9d1d9">opencode-foreman (AI tool), Cashew (Flutter)</tspan></text>

<text x="394.48" y="380" xml:space="preserve"><tspan fill="#fbbf24">Award: </tspan><tspan fill="#c9d1d9">SAUVC 2026 Innovation Award (DPSS sensor system)</tspan></text>

<text x="394.48" y="400" xml:space="preserve"><tspan fill="#4ade80">Contact: </tspan><tspan fill="#c9d1d9">namithnair14@gmail.com  |  linkedin.com/in/namit-nair</tspan></text>

