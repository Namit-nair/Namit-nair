<text x="394.48" y="180" xml:space="preserve"><tspan fill="#22d3ee">Languages: </tspan><tspan fill="#c9d1d9">Python, C++, MATLAB</tspan></text>

<text x="394.48" y="200" xml:space="preserve"><tspan fill="#e879f9">Frameworks: </tspan><tspan fill="#c9d1d9">ROS2, MuJoCo, Gazebo, OpenCV</tspan></text>

<text x="394.48" y="220" xml:space="preserve"><tspan fill="#fbbf24">Hardware: </tspan><tspan fill="#c9d1d9">SolidWorks, Arduino, Pixhawk/ArduPilot</tspan></text>

<text x="394.48" y="240" xml:space="preserve"><tspan fill="#4ade80">Controls: </tspan><tspan fill="#c9d1d9">LQR, PID, State-Space, Kalman Filter, Backstepping</tspan></text>

<text x="394.48" y="260" xml:space="preserve"><tspan fill="#60a5fa">Currently: </tspan><tspan fill="#c9d1d9">Soft robotics intern @ IITGN Robotics Lab</tspan></text>

<text x="394.48" y="280" xml:space="preserve"><tspan fill="#c9d1d9">           (tendon-driven hands, w/ Prof. Madhu Vadali)</tspan></text>

<text x="394.48" y="300" xml:space="preserve"><tspan fill="#22d3ee">Leading: </tspan><tspan fill="#c9d1d9">AUV Project Head @ Dreadnought Robotics</tspan></text>

<text x="394.48" y="320" xml:space="preserve"><tspan fill="#c9d1d9">         SAUVC + TAC, ROS2 migration, Gazebo sim</tspan></text>

<text x="394.48" y="340" xml:space="preserve"><tspan fill="#e879f9">Building: </tspan><tspan fill="#c9d1d9">SpiRobs -- soft tentacle manipulator</tspan></text>

<text x="394.48" y="360" xml:space="preserve"><tspan fill="#fbbf24">Award: </tspan><tspan fill="#c9d1d9">SAUVC 2026 Innovation Award (DPSS sensor system)</tspan></text>

