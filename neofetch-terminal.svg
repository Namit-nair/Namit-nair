<text x="394.48" y="100" xml:space="preserve"><tspan fill="#fbbf24">OS: </tspan><tspan fill="#c9d1d9">B.Tech Mechatronics &amp; Automation</tspan></text>

<text x="394.48" y="120" xml:space="preserve"><tspan fill="#c9d1d9">    VIT Chennai -- Class of 2027</tspan></text>

<text x="394.48" y="140" xml:space="preserve"><tspan fill="#4ade80">Kernel: </tspan><tspan fill="#c9d1d9">CGPA 8.35 / 10</tspan></text>

